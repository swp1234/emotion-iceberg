<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="ice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ED6F5"/>
      <stop offset="100%" style="stop-color:#2E86AB"/>
    </linearGradient>
    <linearGradient id="deep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E86AB"/>
      <stop offset="100%" style="stop-color:#1a4f6e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Water line -->
  <rect x="50" y="230" width="412" height="3" rx="1.5" fill="#2E86AB" opacity="0.4"/>
  <!-- Above water -->
  <polygon points="256,100 310,225 202,225" fill="url(#ice)" opacity="0.9"/>
  <!-- Below water -->
  <polygon points="155,245 357,245 390,340 340,430 172,430 122,340" fill="url(#deep)" opacity="0.7"/>
  <polygon points="155,245 357,245 390,340 340,430 172,430 122,340" fill="none" stroke="#2E86AB" stroke-width="2" opacity="0.3"/>
</svg>
